<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Feud — Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast"></div>

<header id="topbar">
  <div id="topbar-title">🎮 FEUD CONTROL</div>
  <div id="topbar-right">
    <a href="/settings" class="nav-link">⚙ Settings</a>
    <div id="status-dot" title="Connection status"></div>
  </div>
</header>

<div id="status-strip">
  <div class="stat">
    <span class="stat-label">PHASE</span>
    <span class="stat-val" id="stat-phase">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">ROUND</span>
    <span class="stat-val" id="stat-round">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">STRIKES</span>
    <span class="stat-val strikes-val" id="stat-strikes">0</span>
  </div>
  <div class="stat">
    <span class="stat-label" id="stat-t1-name">Team 1</span>
    <span class="stat-val" id="stat-t1-score">0</span>
  </div>
  <div class="stat">
    <span class="stat-label" id="stat-t2-name">Team 2</span>
    <span class="stat-val" id="stat-t2-score">0</span>
  </div>
</div>

<main id="main">

  <!-- ═══ PREGAME ═══ -->
  <div id="view-pregame" class="view">
    <h2 class="view-title">SELECT GAME</h2>
    <select id="set-select" class="full-select">
      <option value="">— No sets saved. Go to Settings. —</option>
    </select>
    <div class="team-row">
      <input id="inp-t1" type="text" placeholder="Team 1 name" maxlength="20">
      <input id="inp-t2" type="text" placeholder="Team 2 name" maxlength="20">
    </div>
    <button class="btn btn-blue full-btn" id="btn-start-game" onclick="startGame()">▶ START GAME</button>
    <a href="/settings" class="btn btn-dim full-btn" style="text-align:center;text-decoration:none;margin-top:8px">⚙ Manage Questions</a>
  </div>

  <!-- ═══ IDLE ═══ -->
  <div id="view-idle" class="view hidden">
    <div class="round-badge" id="idle-round-badge">SELECT A ROUND</div>
    <select id="round-select" class="full-select"></select>
    <button class="btn btn-blue full-btn" id="btn-begin-round" onclick="beginRound()">▶ BEGIN ROUND</button>
    <button class="btn btn-dim small-btn" onclick="emit('game:acknowledgeGameOver')">⬅ Change Game</button>
  </div>

  <!-- ═══ BUZZIN ═══ -->
  <div id="view-buzzin" class="view hidden">
    <div class="round-badge buzz-badge">BUZZ IN!</div>
    <div class="question-box" id="buzzin-question"></div>
    <div class="btn-row">
      <button class="btn btn-p1 player-btn" onclick="emit('game:setActivePlayer', 1)">
        PODIUM 1<br><span id="buzz-t1-name" class="player-team-name">Team 1</span>
      </button>
      <button class="btn btn-p2 player-btn" onclick="emit('game:setActivePlayer', 2)">
        PODIUM 2<br><span id="buzz-t2-name" class="player-team-name">Team 2</span>
      </button>
    </div>
  </div>

  <!-- ═══ PLAYING ═══ -->
  <div id="view-playing" class="view hidden">
    <div class="playing-header">
      <span class="round-badge-sm" id="play-round-badge">R1</span>
      <span class="active-label" id="play-active-label">Answering</span>
      <span class="strike-display" id="play-strikes"></span>
    </div>
    <div class="question-sm" id="play-question"></div>
    <div id="answer-list"></div>
    <button class="btn btn-strike full-btn strike-big" onclick="emit('game:addStrike')">✗ STRIKE</button>
    <button class="btn btn-dim small-btn" onclick="emit('game:resetRound')">↺ Reset Round</button>
  </div>

  <!-- ═══ ROUND OVER ═══ -->
  <div id="view-roundover" class="view hidden">
    <div class="round-badge">ROUND OVER</div>
    <div id="award-section">
      <div class="points-display"><span id="award-pts">0</span> <span class="pts-label">PTS</span></div>
      <p class="award-label">AWARD TO:</p>
      <div class="btn-row">
        <button class="btn btn-green flex-1 award-btn" onclick="emit('game:awardPoints', 1)" id="award-btn-1">→ Team 1</button>
        <button class="btn btn-green flex-1 award-btn" onclick="emit('game:awardPoints', 2)" id="award-btn-2">→ Team 2</button>
      </div>
    </div>
    <div class="inline-scores" id="roundover-scores"></div>
    <button class="btn btn-blue full-btn" onclick="emit('game:nextRound')" id="btn-next-round">NEXT ROUND ⏭</button>
    <button class="btn btn-dim small-btn" onclick="emit('game:resetRound')">↺ Reset Round</button>
  </div>

  <!-- ═══ GAME OVER ═══ -->
  <div id="view-gameover" class="view hidden">
    <div class="round-badge">GAME OVER</div>
    <div class="final-scores" id="final-scores"></div>
    <div class="winner-label" id="winner-label"></div>
    <button class="btn btn-blue full-btn" onclick="emit('game:acknowledgeGameOver')">▶ NEW GAME</button>
    <button class="btn btn-dim small-btn" onclick="confirmReset()">↺ Reset Scores</button>
  </div>

</main>

<!-- Sounds tray — always visible -->
<div id="sounds-tray">
  <button class="sound-btn" title="Theme"  onclick="emit('game:playSound','theme')">🎵</button>
  <button class="sound-btn" title="Ding"   onclick="emit('game:playSound','ding')">🔔</button>
  <button class="sound-btn" title="Wrong"  onclick="emit('game:playSound','wrong')">❌</button>
  <button class="sound-btn" title="Reveal" onclick="emit('game:playSound','reveal')">✨</button>
  <button class="sound-btn" title="Winner" onclick="emit('game:playSound','winner')">🏆</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
